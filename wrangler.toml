name = "martol"
# account_id set via CLOUDFLARE_ACCOUNT_ID environment variable
main = "worker-entry.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# Sentry requires version metadata for release tracking
[version_metadata]
binding = "CF_VERSION_METADATA"

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[placement]
mode = "smart"

[observability]
enabled = true
head_sampling_rate = 0.1

[observability.logs]
enabled = true
head_sampling_rate = 0.1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 0.1

[[kv_namespaces]]
binding = "CACHE"
id = "3f35237a947044bbb2a5dde31dd1f2e8"

[[routes]]
pattern = "martol.plitix.com/*"
zone_name = "plitix.com"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "opensesame"
preview_bucket_name = "opensesame-dev"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "14081dac30c2417e907bd9a3f77cf4a8"

[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

[vars]
ENVIRONMENT = "production"
APP_BASE_URL = "https://martol.plitix.com"

EMAIL_FROM="noreply@roadasset.co"
EMAIL_NAME="Martol"

# Public key — embedded in client HTML for Turnstile widget
TURNSTILE_SITE_KEY = "0x4AAAAAACkQpeHr3nM8lyRa"
ENABLE_UPLOADS = "true"

# Stripe publishable key (safe for client)
STRIPE_PUBLISHABLE_KEY = "pk_test_51T78xgDkVAFKcyqKXNe7msMXQGLnj1ObPLhjrIlbI2Ox7z8pajqpQPmipK5DWJ70ZjRUZLd5ib7wfwhJgo7JHYdb00qs7Mlq0w"
# Stripe price IDs (created in Stripe Dashboard)
STRIPE_PRO_PRICE_ID = "price_1T7NluDkVAFKcyqKBdjrDYey"
# STRIPE_PRO_ANNUAL_PRICE_ID — set via: wrangler secret put STRIPE_PRO_ANNUAL_PRICE_ID

# secrets
# TURNSTILE_SECRET_KEY
# RESEND_API_KEY
# BETTER_AUTH_SECRET
# HMAC_SIGNING_SECRET
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# STRIPE_PRICE_ID

# CSAM scanning: enable in Cloudflare dashboard → Caching > Configuration > CSAM Scanning Tool
# Image responses are cached via Workers Cache API so they flow through the scanning pipeline.

[[vectorize]]
binding = "VECTORIZE"
index_name = "martol-docs"

[ai]
binding = "AI"

[triggers]
crons = ["*/5 * * * *"]
